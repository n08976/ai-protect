# Tier 4 example — engineer's local code-summary assistant (single user).
name: dev-code-summarizer
owner: dev-tools@example.health
on_call: dev-tools-oncall@example.health
description: >
  Single-user CLI that summarizes diffs in pull requests. Public/internal
  source code only; no PHI; advisory output.

data_sensitivity: confidential
decision_impact: advisory
integration_footprint: read_only
user_population: single_user

models:
  - name: claude-haiku-gateway
    provider: anthropic
    model: claude-haiku-4-5-20251001
    via_gateway: true
    baa_covered: false
    auth_env: ANTHROPIC_API_KEY

mcp_servers: []

surfaces:
  has_user_chat: true

target:
  allow_mutation: false

expected_actions: []
expected_data_scopes: [internal]

source_path: ./
