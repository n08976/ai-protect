# Tier 1 example — clinical assistant that touches PHI via an EHR MCP.
# Used in the README walk-through.
name: clinical-assistant-prototype
owner: jdoe@example.health
on_call: appsec-oncall@example.health
description: >
  Clinician-facing assistant that summarizes patient charts and drafts
  follow-up notes. Pulls PHI from the EHR via an internal MCP server.

# v2.1 four-dimension scoring inputs
data_sensitivity: phi
decision_impact: clinical_influence
integration_footprint: agent_tool_use
user_population: enterprise

models:
  - name: claude-sonnet-bedrock-baa
    provider: anthropic
    model: claude-sonnet-4-6
    via_gateway: true
    baa_covered: true
    auth_env: ANTHROPIC_API_KEY

mcp_servers:
  - name: ehr-read-mcp
    tier: 1
    data_scope: phi
    actions: [get_chart, search_problems, list_medications]
    side_effects: read_only
  - name: messaging-mcp
    tier: 2
    data_scope: internal
    actions: [send_secure_message]
    side_effects: mutating

surfaces:
  has_user_chat: true
  has_email_intake: false
  has_document_ingest: true
  has_webhook: false

target:
  base_url: https://clinical-assistant.example.health
  api_url: https://agent-runtime.example.health/api/v1
  test_user_token_env: TEST_AGENT_TOKEN
  allow_mutation: false
  network_allowed_zones: [ai-application-zone]

# Ground truth — actions the agent IS expected to invoke. Anything else is a
# scope violation.
expected_actions:
  - get_chart
  - search_problems
  - list_medications

expected_data_scopes: [phi, internal]

# Optional: declare which mutating MCPs require step-up auth.
step_up_auth:
  required_for: [messaging-mcp]

# Threat model artifact — required for Tier 1 / 2 at design stage.
threat_model_path: pipeline/fixtures/clinical_assistant_threat_model.yml

# NeMo Guardrails config — Tier 1 / 2 apps must declare runtime guardrails so
# the gateway has per-app input/output rails beyond the global DLP layer.
guardrails_path: pipeline/fixtures/clinical_assistant_guardrails.yml

# Where the source tree lives — used by trufflehog / semgrep / pip-audit /
# osv-scanner / etc. at build stage. Pointing at a self-contained fixture
# directory so example scans don't write artifacts into the ai-protect
# repo root (which previously happened with source_path: ./).
source_path: pipeline/fixtures/clinical_assistant
