# Tier 3 example — internal advisory chatbot for HR policy questions.
name: hr-policy-advisor
owner: hrtech@example.health
on_call: hrtech-oncall@example.health
description: >
  Read-only Q&A bot that answers employee HR policy questions from a
  curated corpus. No PHI; no write-back; broad enterprise reach.

data_sensitivity: confidential
decision_impact: advisory
integration_footprint: read_only
user_population: enterprise

models:
  - name: claude-haiku-gateway
    provider: anthropic
    model: claude-haiku-4-5-20251001
    via_gateway: true
    baa_covered: false
    auth_env: ANTHROPIC_API_KEY

mcp_servers:
  - name: hr-corpus-mcp
    tier: 3
    data_scope: internal
    actions: [search_policy, retrieve_section]
    side_effects: read_only

surfaces:
  has_user_chat: true

target:
  base_url: https://hr-bot.example.health
  allow_mutation: false

expected_actions: [search_policy, retrieve_section]
expected_data_scopes: [internal]

source_path: ./
