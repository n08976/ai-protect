name: publish to PyPI

# Builds the distributions and publishes them to PyPI via Trusted Publishing
# (OIDC) — no API token is stored anywhere. A published GitHub Release triggers
# the upload; a manual run validates the build WITHOUT publishing.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   PyPI project name : ai-protect
#   Owner             : n08976
#   Repository        : ai-protect
#   Workflow          : release.yml
#   Environment       : pypi
on:
  release:
    types: [published]
  workflow_dispatch: {}   # build + verify only (publish is gated to releases)

permissions:
  contents: read

jobs:
  build:
    name: build + check distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          # Clean only the setuptools staging (NOT the tracked build/ diagram
          # scripts) so no stale layout can leak into the wheel. Use the
          # pyproject-build console script — `python -m build` would be shadowed
          # by the repo's build/ directory.
          rm -rf build/lib build/bdist.* dist *.egg-info
          pyproject-build

      - name: Verify the wheel ships only ai_protect (no stray top-level pkg)
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob('dist/*.whl')[0]
          tops = sorted({n.split('/')[0] for n in zipfile.ZipFile(whl).namelist()})
          pkgs = [t for t in tops if not t.endswith('.dist-info')]
          print('wheel top-level packages:', pkgs)
          assert pkgs == ['ai_protect'], f'unexpected top-level packages: {pkgs}'
          PY

      - name: twine check (metadata + README render)
        run: twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Only a published Release actually uploads; manual runs stop after build.
    if: github.event_name == 'release'
    # No GitHub environment — the trusted publisher matches on owner/repo/
    # workflow only (configure the PyPI pending publisher with Environment blank).
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
